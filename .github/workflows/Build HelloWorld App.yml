name: Build HelloWorld App

on:
  push:
    branches:
      - main
      - develop
      - qa
      - nath

  pull_request:
    branches:
      - main
      - develop
      - qa

  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build (develop / qa / main)'
        required: true
        type: string

permissions:
  id-token: write
  contents: write          # Required for semantic version tags
  actions: read
  security-events: write

jobs:

  validate:
    name: Validate (Format & Restore)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Packages
        run: dotnet restore src/HelloWorld/HelloWorld.csproj

      - name: Validate Code Formatting
        run: dotnet format src/HelloWorld/HelloWorld.csproj


  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: validate

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Packages
        run: dotnet restore src/HelloWorld/HelloWorld.csproj

      - name: Build Application
        run: dotnet build src/HelloWorld/HelloWorld.csproj -c Release --no-restore


  package:
    name: Package Artifact
    runs-on: ubuntu-latest
    needs: build

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Application
        run: |
          dotnet publish src/HelloWorld/HelloWorld.csproj \
            -c Release \
            -o ./artifacts/publish

      - name: Create ZIP Package
        run: |
          cd artifacts/publish
          zip -r ../helloworld-artifact.zip .

      - name: Validate Artifact
        run: |
          echo "Generated Artifact:"
          ls -la ./artifacts/helloworld-artifact.zip

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: helloworld-artifact
          path: ./artifacts/helloworld-artifact.zip
          if-no-files-found: error
          retention-days: 60


  call-deploy:
    name: Trigger Deployment Pipeline
    needs: package

    if: github.event_name == 'push'

    uses: ./.github/workflows/cd.yml

    with:
      branch: ${{ github.ref_name }}
      run_id: ${{ github.run_id }}

    secrets: inherit