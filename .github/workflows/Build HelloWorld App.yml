name: Build HelloWorld App

on:
  push:
    branches:
      - main
      - develop
      - QA
  pull_request:
    branches:
      - main
      - develop
      - QA

permissions:
  id-token: write
  contents: read
  actions: read
  security-events: write

concurrency:
  group: ci-${{ github.ref_name }}
  cancel-in-progress: false

# CI STAGE : validate code formatting and restore dependencies

jobs:
  validate:
    name: Validate (format & restore)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - run: dotnet restore src/HelloWorld/HelloWorld.csproj
      - run: dotnet format src/HelloWorld/HelloWorld.csproj

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet restore src/HelloWorld/HelloWorld.csproj
      - run: dotnet build src/HelloWorld/HelloWorld.csproj -c Release

  package:
    name: Package Artifact
    runs-on: ubuntu-latest
    needs: build
    if: success()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish and zip
        run: |
          dotnet publish src/HelloWorld/HelloWorld.csproj -c Release -o ./artifacts/publish
          cd artifacts/publish
          zip -r ../helloworld-artifact.zip .

      - name: Validate Artifact
        run: |
          ls -la ./artifacts/helloworld-artifact.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: helloworld-artifact
          path: ./artifacts/helloworld-artifact.zip

  call-deploy:
    name: Trigger Deploy
    needs: package
    if: github.event_name == 'push'
    uses: ./.github/workflows/CD.yml
    with:
      branch: ${{ github.ref_name }}
      run_id: ${{ github.run_id }}
    secrets: inherit
