name: Build HelloWorld App

on:
  push:
    branches:
      - main
      - develop
      - qa
  pull_request:
    branches:
      - main
      - develop
      - qa

  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build (develop / qa / main)'
        required: true
        type: string
      semantic_version:
        description: 'Optional semantic version tag '
        required: false
        type: string


permissions:
  id-token: write
  contents: read
  actions: read
  security-events: write


# CI STAGE : validate code formatting and restore dependencies

jobs:
  validate:
    name: Validate 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - run: dotnet restore src/HelloWorld/HelloWorld.csproj
      - run: dotnet format src/HelloWorld/HelloWorld.csproj

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet restore src/HelloWorld/HelloWorld.csproj
      - run: dotnet build src/HelloWorld/HelloWorld.csproj -c Release

  package:
    name: Package Artifact
    runs-on: ubuntu-latest
    needs: build
    if: success()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish 
        run: |
          dotnet publish src/HelloWorld/HelloWorld.csproj -c Release -o ./artifacts/publish

      - name: Set semantic version metadata
        id: semantic-meta
        run: |
          VERSION_TAG="${{ github.event.inputs.semantic_version }}"
          if [ -z "$VERSION_TAG" ]; then
            VERSION_TAG="v1.0.${GITHUB_RUN_NUMBER}"
          fi
          echo "semantic_version=$VERSION_TAG" >> "$GITHUB_OUTPUT"

      - name: Validate Artifact
        run: |
          ls -la ./artifacts
          ls -la ./artifacts/publish
          test -d ./artifacts/publish 

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: helloworld-artifact
          path: ./artifacts/publish/

  call-deploy:
    name: Trigger Deploy
    needs: package
    if: github.event_name == 'push'
    uses: ./.github/workflows/cd.yml
    with:
      branch: ${{ github.ref_name }}
      run_id: ${{ github.run_id }}
      semantic_version: ${{ needs.package.outputs.semantic_version || github.event.inputs.semantic_version }}
    secrets: inherit