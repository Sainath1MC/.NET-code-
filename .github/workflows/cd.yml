name: Deploy HelloWorld App

on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
      run_id:
        required: false
        type: string

  workflow_dispatch:
    inputs:
      target_environment:
        description: 'Target environment to deploy (develop / qa / main)'
        required: true
        type: choice
        options:
          - develop
          - qa
          - main

      source_type:
        description: 'Select how the artifact should be resolved for rollback/manual deploy'
        required: true
        type: choice
        options:
          - latest_successful_build
          - run_id
      run_id:
        description: 'Optional GitHub run_id for manual rollback deployment'
        required: false
        type: string

permissions:
  contents: read
  id-token: write
  actions: read

jobs:
  resolve-run-id:
    name: Resolve artifact source
    runs-on: ubuntu-latest
    outputs:
      run_id: ${{ steps.get-run.outputs.run_id }}
      branch: ${{ steps.get-branch.outputs.branch }}
    steps:
      - name: Set branch value
        id: get-branch
        run: |
          TARGET_ENVIRONMENT="${{ inputs.target_environment || inputs.branch }}"
          case "$TARGET_ENVIRONMENT" in
            develop) echo "branch=develop" >> "$GITHUB_OUTPUT" ;;
            qa) echo "branch=qa" >> "$GITHUB_OUTPUT" ;;
            main) echo "branch=main" >> "$GITHUB_OUTPUT" ;;
            *) echo "Unsupported deploy target: $TARGET_ENVIRONMENT"; exit 1 ;;
          esac

      - name: Resolve run_id from selected source
        id: get-run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.get-branch.outputs.branch }}"
          SOURCE_TYPE="${{ inputs.source_type }}"

          if [ -z "$SOURCE_TYPE" ]; then
            SOURCE_TYPE="latest_successful_build"
          fi

          if [ "$SOURCE_TYPE" = "run_id" ]; then
            RUN_ID="${{ inputs.run_id }}"
            if [ -z "$RUN_ID" ]; then
              echo "run_id is required when source_type is run_id" >&2
              exit 1
            fi
            echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "${{ inputs.run_id }}" ]; then
            echo "run_id=${{ inputs.run_id }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LATEST_RUN_ID=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow "Build HelloWorld App" \
            --branch "$BRANCH" \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')

          echo "run_id=$LATEST_RUN_ID" >> "$GITHUB_OUTPUT"

  deploy-dev:
    name: Deploy to development environment
    needs: resolve-run-id
    if: ${{ needs.resolve-run-id.outputs.branch == 'develop' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # CHANGED: download into a plain folder (./artifacts), not ./artifacts/publish/
      # because ci.yml now uploads a single ZIP file (helloworld-artifact.zip) as the artifact,
      # not an extracted folder of app files.
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: helloworld-artifact
          path: ./artifacts
          repository: ${{ github.repository }}
          run-id: ${{ needs.resolve-run-id.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify downloaded ZIP
        run: ls -la ./artifacts/helloworld-artifact.zip

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.DEV_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.DEV_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.DEV_AZURE_SUBSCRIPTION_ID }}

      # CHANGED: package now points directly to the zip file, not a folder
      - name: Deploy to Azure Function App (DEV)
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.DEV_FUNCTION_APP_NAME }}
          package: ./artifacts/helloworld-artifact.zip

      - name: Logout from Azure
        if: always()
        run: az logout || true

  deploy-qa:
    name: Deploy to QA environment
    needs: resolve-run-id
    if: ${{ needs.resolve-run-id.outputs.branch == 'qa' }}
    runs-on: ubuntu-latest
    environment: qa

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: helloworld-artifact
          path: ./artifacts
          repository: ${{ github.repository }}
          run-id: ${{ needs.resolve-run-id.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify downloaded ZIP
        run: ls -la ./artifacts/helloworld-artifact.zip

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.QA_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.QA_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.QA_AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Function App (QA)
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.QA_FUNCTION_APP_NAME }}
          package: ./artifacts/helloworld-artifact.zip

      - name: Logout from Azure
        if: always()
        run: az logout

  deploy-prod:
    name: Deploy to prod environment
    needs: resolve-run-id
    if: ${{ needs.resolve-run-id.outputs.branch == 'main' }}
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: helloworld-artifact
          path: ./artifacts
          repository: ${{ github.repository }}
          run-id: ${{ needs.resolve-run-id.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify downloaded ZIP
        run: ls -la ./artifacts/helloworld-artifact.zip

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.Prod_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.Prod_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.Prod_AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Function App (Prod)
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.PROD_FUNCTION_APP_NAME }}
          package: ./artifacts/helloworld-artifact.zip

      - name: Logout from Azure
        if: always()
        run: az logout