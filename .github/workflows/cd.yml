name: .NET Console App CD

on:
  workflow_run:
    workflows:
      - Build HelloWorld App
    types:
      - completed

permissions:
  contents: read

jobs:
  deploy-development:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'development'
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: helloworld
          path: ./publish

      - name: Deployment placeholder
        run: |
          echo "Build succeeded for development branch."
          echo "Add your deployment commands or Azure action here."

  deploy-qa:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'qa'
    runs-on: ubuntu-latest
    environment: qa

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: helloworld
          path: ./publish

      - name: Deployment placeholder
        run: |
          echo "Build succeeded for qa branch."
          echo "Add your deployment commands or Azure action here."
