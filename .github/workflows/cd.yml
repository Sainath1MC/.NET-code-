name: Deploy HelloWorld App

on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
      version:
        description: 'Version to deploy (e.g. v1.0.5)'
        required: false
        type: string
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy (develop / qa / main)'
        required: true
        type: string
      version:
        description: 'Optional exact version to deploy (e.g. v1.0.5). Leave blank to deploy the current pointer for this branch.'
        required: false
        type: string

permissions:
  contents: read
  id-token: write
  actions: read

jobs:
  # ---------------- Resolve exactly which version+zip to deploy ----------------
  resolve-version:
    name: Resolve version and artifact
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.set-branch.outputs.branch }}
      version: ${{ steps.get-version.outputs.version }}
      artifact_zip: ${{ steps.get-version.outputs.artifact_zip }}
    steps:
      - name: Set branch value
        id: set-branch
        run: echo "branch=${{ inputs.branch }}" >> "$GITHUB_OUTPUT"

      # Login with the Storage-only identity to read metadata / the current pointer
      - name: Login to Azure (Storage)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.STORAGE_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.STORAGE_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.STORAGE_AZURE_SUBSCRIPTION_ID }}

      # If an explicit version was passed (normal CI trigger, or rollback), use it directly.
      # Otherwise (manual dispatch with no version), fall back to metadata/current-<branch>.json
      - name: Resolve version
        id: get-version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            az storage blob download \
              --account-name ${{ vars.STORAGE_ACCOUNT_NAME }} \
              --container-name ${{ vars.STORAGE_CONTAINER_NAME }} \
              --name "metadata/current-${{ inputs.branch }}.json" \
              --file ./current.json \
              --auth-mode login
            VERSION=$(jq -r '.version' ./current.json)
          fi
          ARTIFACT_ZIP="${{ vars.ARTIFACT_NAME }}-${VERSION}.zip"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "artifact_zip=$ARTIFACT_ZIP" >> "$GITHUB_OUTPUT"
          echo "Deploying version: $VERSION ($ARTIFACT_ZIP)"

      - name: Logout from Azure
        if: always()
        run: az logout || true

  # ---------------- DEV ----------------
  deploy-dev:
    name: Deploy to development environment
    needs: resolve-version
    if: ${{ needs.resolve-version.outputs.branch == 'develop' }}
    runs-on: ubuntu-latest

    steps:
      # Login with Storage identity + download ZIP from Blob by version (durable, supports rollback)
      - name: Login to Azure (Storage)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.STORAGE_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.STORAGE_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.STORAGE_AZURE_SUBSCRIPTION_ID }}

      - name: Download versioned ZIP from Blob Storage
        run: |
          az storage blob download \
            --account-name ${{ vars.STORAGE_ACCOUNT_NAME }} \
            --container-name ${{ vars.STORAGE_CONTAINER_NAME }} \
            --name "releases/${{ needs.resolve-version.outputs.artifact_zip }}" \
            --file "./${{ needs.resolve-version.outputs.artifact_zip }}" \
            --auth-mode login

      - name: Logout from Azure (Storage)
        run: az logout || true

      # Existing Function App login/deploy steps
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.DEV_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.DEV_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.DEV_AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Function App (DEV)
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.DEV_FUNCTION_APP_NAME }}
          package: ./${{ needs.resolve-version.outputs.artifact_zip }}

      - name: Logout from Azure
        if: always()
        run: az logout || true

  # ---------------- QA ----------------
  deploy-qa:
    name: Deploy to QA environment
    needs: resolve-version
    if: ${{ needs.resolve-version.outputs.branch == 'qa' }}
    runs-on: ubuntu-latest
    environment: qa

    steps:
      - name: Login to Azure (Storage)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.STORAGE_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.STORAGE_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.STORAGE_AZURE_SUBSCRIPTION_ID }}

      - name: Download versioned ZIP from Blob Storage
        run: |
          az storage blob download \
            --account-name ${{ vars.STORAGE_ACCOUNT_NAME }} \
            --container-name ${{ vars.STORAGE_CONTAINER_NAME }} \
            --name "releases/${{ needs.resolve-version.outputs.artifact_zip }}" \
            --file "./${{ needs.resolve-version.outputs.artifact_zip }}" \
            --auth-mode login

      - name: Logout from Azure (Storage)
        run: az logout || true

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.QA_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.QA_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.QA_AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Function App (QA)
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.QA_FUNCTION_APP_NAME }}
          package: ./${{ needs.resolve-version.outputs.artifact_zip }}

      - name: Logout from Azure
        if: always()
        run: az logout

  # ---------------- PROD (approval gate preserved via environment: Production) ----------------
  deploy-prod:
    name: Deploy to prod environment
    needs: resolve-version
    if: ${{ needs.resolve-version.outputs.branch == 'main' }}
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Login to Azure (Storage)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.STORAGE_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.STORAGE_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.STORAGE_AZURE_SUBSCRIPTION_ID }}

      - name: Download versioned ZIP from Blob Storage
        run: |
          az storage blob download \
            --account-name ${{ vars.STORAGE_ACCOUNT_NAME }} \
            --container-name ${{ vars.STORAGE_CONTAINER_NAME }} \
            --name "releases/${{ needs.resolve-version.outputs.artifact_zip }}" \
            --file "./${{ needs.resolve-version.outputs.artifact_zip }}" \
            --auth-mode login

      - name: Logout from Azure (Storage)
        run: az logout || true

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.Prod_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.Prod_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.Prod_AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Function App (Prod)
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.PROD_FUNCTION_APP_NAME }}
          package: ./${{ needs.resolve-version.outputs.artifact_zip }}

      - name: Logout from Azure
        if: always()
        run: az logout
