name: Deploy HelloWorld App

on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
      run_id:
        required: false
        type: string

permissions:
  contents: write
  id-token: write
  actions: read

jobs:
  resolve-run-id:
    # <-- Use your existing resolve-run-id job unchanged

  create-version-tag:
    name: Create Semantic Version
    needs: resolve-run-id
    if: needs.resolve-run-id.outputs.branch == 'qa' || needs.resolve-run-id.outputs.branch == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git fetch --tags
      - id: version
        shell: bash
        run: |
          # Determine latest production tag
          LAST=$(git tag --list 'v*' --sort=-v:refname | grep -v '\-qa' | head -1)
          [ -z "$LAST" ] && LAST=v1.0.0
          VER=${LAST#v}
          IFS='.' read MA MI PA <<< "$VER"
          PA=$((PA+1))
          if [ "${{ needs.resolve-run-id.outputs.branch }}" = "qa" ]; then
            COUNT=$(git tag --list "v${MA}.${MI}.${PA}-qa.*" | wc -l)
            TAG="v${MA}.${MI}.${PA}-qa.$((COUNT+1))"
          else
            TAG="v${MA}.${MI}.${PA}"
          fi
          echo "version=$TAG" >> $GITHUB_OUTPUT
      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}
      - if: needs.resolve-run-id.outputs.branch == 'main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          generate_release_notes: true

  deploy-dev:
    needs: resolve-run-id
    # <-- Keep your existing deployment job unchanged

  deploy-qa:
    needs: [resolve-run-id, create-version-tag]
    # <-- Keep existing QA deployment steps unchanged
    # Add:
    # - run: echo "Deploying ${{ needs.create-version-tag.outputs.version }}"

  deploy-prod:
    needs: [resolve-run-id, create-version-tag]
    # <-- Keep existing PROD deployment steps unchanged
    # Add:
    # - run: echo "Deploying ${{ needs.create-version-tag.outputs.version }}"