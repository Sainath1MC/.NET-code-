name: Deploy HelloWorld App

on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
      run_id:
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  actions: read

jobs:
  deploy-dev:
    name: Deploy to development environment
    if: ${{ inputs.branch == 'Development' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: helloworld-artifact
          path: ./publish
          repository: ${{ github.repository }}
          run-id: ${{ inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.DEV_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.DEV_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.DEV_AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to DEV
        run: |
          echo "Add your deployment step here (e.g. az webapp deploy, azure/functions-action, etc.)"
          # Example:
          # az webapp deploy --resource-group <rg> --name <app-name> --src-path ./publish/helloworld-artifact.zip --type zip

      - name: Logout from Azure
        if: always()
        run: az logout

